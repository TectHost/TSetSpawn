Config:
    enter-message: true
    enter-message-text: "&6&lWelcome to the server %player%! &f| &5TSetSpawn"
    go-spawn: true
    join: true
    join-message: "&5TSetSpawn &e> &f%player% has joined."
    quit: true
    quit-message: "&5TSetSpawn &e> &f%player% has left."
    welcome: true
    welcome-message: "&5TSetSpawn &e> &f%player% entered for the first time!"
    # cooldown-time is for time between teleport and teleport
    cooldown-time: 5
    enable-void-teleport: true
    cancel-on-move: true
    death-teleport: true
    drop-items-on-death: true
    Translate:
      version: "&5TSetSpawn &e> &7The version is: %version%"
      spawn-not-placed: "&5TSetSpawn &e> &cThe spawn does not exist"
      console: "&5TSetSpawn &e> &7You cannot send commands from the console"
      spawn-placed: "&5TSetSpawn &e> &aSpawn placed"
      reload: "&5TSetSpawn &e> &aReloaded"
      unknown-command: "&5TSetSpawn &e> &cUnknown command"
      help: "&5TSetSpawn &e> &fUse the command &a/spawn &fto go to the spawn"
      spawn: "&5TSetSpawn &e> &fYou have been teleported"
      no-permission: "&5TSetSpawn &e> &cYou do not have permissions"
      cooldown-message: "&5TSetSpawn &e> &cYou have to wait &e%time% &cseconds before running this command again!"
      void-teleport-message: "&5TSetSpawn &e> &fTeleported to the Spawn"
      move-cancel-message: "&5TSetSpawn &e> &fTeleport canceled because you have moved."
      disconnect-message: "&5TSetSpawn &e> &fTeleport canceled because you disconnected."
    Particles:
      enabled: false
      radius: 1.5
      amount: 50
      particle-type: MOBSPAWNER_FLAMES
    Sound:
      enable-sound: false
      sound-type: "LEVEL_UP"
      volume: 1.0
      pitch: 1.0
    # wait-time is for time to teleport to spawn
    Wait-time:
      enabled: true
      time: 5
      messages:
        "5": "&5TSetSpawn &e> &fGet ready! Teleporting in 5 seconds."
        "4": "&5TSetSpawn &e> &fGet ready! Teleporting in 4 seconds."
        "3": "&5TSetSpawn &e> &fGet ready! Teleporting in 3 seconds."
        "2": "&5TSetSpawn &e> &fGet ready! Teleporting in 2 seconds."
        "1": "&5TSetSpawn &e> &fGet ready! Teleporting in 1 seconds."
        "0": "&5TSetSpawn &e> &fTeleporting now!"
      titles-enabled: true
      title-message: "&aTeleporting!"
      subtitle-message: "&eGet ready!"
      
    
      