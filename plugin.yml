main: minealex.tsetspawn.TSetSpawn
version: 3.0.4
name: TSetSpawn

commands:
  tsetspawn:
    description: Help command
    aliases:
      - tss
  spawn:
    description: Go to the spawn
  setspawn:
    description: Set the spawn
  ftsetspawn:
    description: Set the ftspawn
  removespawn:
    description: Remove the spawn

permissions:
  tsetspawn.reload:
    description: Allows reloading the plugin

  tsetspawn.version:
    description: Allows checking the plugin version

  tsetspawn.setspawn:
    description: Allows setting the spawn

  tsetspawn.ftsetspawn:
    description: Allows setting the ftspawn

  tsetspawn.admin:
    description: Allows administrative commands for TSetSpawn

  tsetspawn.remove:
    description: Allows removing the spawn
